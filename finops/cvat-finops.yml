description: >-
  FinOps view of CVAT spend. CVAT cost has two distinct shapes. Self-hosted
  Community edition (MIT) carries no vendor license fee; the spend is the
  operator's own infrastructure (compute, storage, GPU for auto-annotation,
  egress) and ops effort. CVAT Online (app.cvat.ai) is a subscription SaaS:
  flat monthly/annual for Free and Solo, per-seat for Team, and negotiated for
  Enterprise, with consumption gated by plan quotas on projects, tasks,
  storage, cloud connections, and monthly AI (auto-annotation) calls. Annual
  billing reduces effective per-seat cost by roughly 30%.
notes: >-
  Hosted prices, seat minimums, and quota ceilings change; verify against the
  CVAT pricing pages during reconciliation. For self-hosted, the meaningful
  meters are infrastructure resources rather than vendor charges.
