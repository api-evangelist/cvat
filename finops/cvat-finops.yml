meters:
- name: subscription_seats
  description: Billable seats on the Team plan, charged per user per billing cycle (minimum two seats).
  unit: seats
  aggregation: max
  dimensions:
  - account
  - organization
  - plan
- name: subscription_flat
  description: Flat monthly or annual charge for Free and Solo hosted plans.
  unit: subscription
  aggregation: max
  dimensions:
  - account
  - plan
- name: ai_calls
  description: Automatic-annotation (AI) calls consumed against the monthly plan allowance.
  unit: invocations
  aggregation: sum
  dimensions:
  - account
  - organization
  - plan
- name: internal_storage_gb
  description: Internal storage consumed against the plan storage quota.
  unit: gigabytes
  aggregation: max
  dimensions:
  - account
  - organization
  - plan
- name: project_count
  description: Projects created against the plan project quota.
  unit: projects
  aggregation: max
  dimensions:
  - account
  - organization
  - plan
- name: task_count
  description: Tasks created against the plan task quota.
  unit: tasks
  aggregation: max
  dimensions:
  - account
  - organization
  - plan
- name: self_hosted_infrastructure
  description: Operator-owned compute, storage, GPU, and egress for self-hosted Community CVAT (no vendor charge).
  unit: resource_hours
  aggregation: sum
  dimensions:
  - environment
  - resource
principles:
- name: Visibility
  description: Track seat count, AI-call burn, and storage/task/project quota usage in the CVAT Online org dashboard; for self-hosted, track underlying cloud infrastructure spend.
- name: Allocation
  description: Map organizations and seats to teams and cost centers; tag self-hosted infrastructure per environment.
- name: Optimization
  description: Choose self-hosted Community (MIT, $0 license) when ops capacity exists and data residency matters; on hosted, right-size the plan to quota usage, prefer annual billing (~30% off), and reclaim idle seats.
- name: Accountability
  description: Assign an owner per organization; review seat count, AI-call consumption, and quota headroom monthly against budget.
