aid: cvat
name: CVAT
review:
  question: Does CVAT expose a documented public WebSocket or streaming API?
  answer: false
  date: '2026-06-21'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. CVAT's API is a synchronous REST API.
    Long-running operations (data upload, annotation and dataset import/export)
    are handled with an asynchronous request/poll pattern over plain HTTP - the
    server returns a request id (rq_id) and the client polls GET
    /api/requests/{rq_id} until completion. This is HTTP request/response
    polling, not Server-Sent Events and not WebSocket, so there is no
    event-driven streaming surface in scope for AsyncAPI modeling.
findings:
  summary: |
    CVAT does not publish a documented public WebSocket or SSE streaming API.
    The platform (both self-hosted Community under the MIT License and the
    hosted CVAT Online service at app.cvat.ai) exposes a synchronous REST API
    under the /api base path, documented with an OpenAPI 3.0.3 schema served at
    /api/schema/ and interactive docs at /api/docs/. Authentication is via
    Token (Authorization: Token <key>), HTTP Basic, or session. Heavy jobs run
    as background processes polled through the requests endpoint. No realtime,
    bidirectional, or push (ws:// or wss://) endpoint is documented.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://app.cvat.ai/api
      documented: true
    - protocol: REST (self-hosted)
      scheme: http
      baseURL: http://localhost:8080/api
      documented: true
    - protocol: Async Polling
      scheme: https
      note: Background jobs return rq_id; client polls GET /api/requests/{rq_id}. HTTP polling, not SSE or WebSocket.
      documented: true
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented in the CVAT API reference, SDK docs, or developer guide as of the review date.
