sources:
  - url: https://docs.cvat.ai/docs/api_sdk/api/
    type: Documentation
    note: Server API overview; lists resource groups and the REST design pattern. No WebSocket mentioned.
  - url: https://app.cvat.ai/api/docs/
    type: APIReference
    note: Interactive Swagger UI for the live OpenAPI 3.0.3 schema; all endpoints are HTTPS REST.
  - url: https://docs.cvat.ai/docs/administration/basics/rest_api_guide/
    type: Documentation
    note: REST API guide; describes the rq_id request/poll pattern for background jobs (HTTP polling, not WebSocket).
  - url: https://github.com/cvat-ai/cvat
    type: GitHub
    note: MIT-licensed source; schema.yml is OpenAPI 3.0.3. No streaming/WebSocket API surface.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket or SSE protocol surface exists. CVAT is a synchronous REST API
    that uses HTTP request/poll for long-running operations, so no AsyncAPI
    document was created. The apis.yml catalogs the REST sub-APIs with OpenAPI,
    Postman, and Open Collection references.
