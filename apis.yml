aid: cvat
url: https://raw.githubusercontent.com/api-evangelist/cvat/refs/heads/main/apis.yml
name: CVAT
kind: company
description: CVAT (Computer Vision Annotation Tool) is an open-source platform for
  annotating images, video, and 3D point clouds for vision AI. The CVAT REST API
  exposes projects, tasks, jobs, annotations, labels, organizations, memberships,
  and cloud storage integrations, available both self-hosted (MIT-licensed) and as
  the hosted CVAT Online service at app.cvat.ai.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Computer Vision
- Data Annotation
- Labeling
- Datasets
- Open Source
